<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pomodoro Timer 🚀</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="modes">
      <button id="focusBtn" class="mode-btn active" data-mode="focus">Focus</button>
      <button id="shortBreakBtn" class="mode-btn" data-mode="shortBreak">Short Break</button>
      <button id="longBreakBtn" class="mode-btn" data-mode="longBreak">Long Break</button>
    </div>
    <div class="timer" id="timerDisplay">25:00</div>
    <div class="controls">
      <button id="startBtn">Start</button>
      <button id="pauseBtn">Pause</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
